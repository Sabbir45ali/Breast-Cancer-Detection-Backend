services:
  - type: web
    name: bcd-core-api
    rootDir: BCD_Models
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ML_SERVICE_URL
        value: https://your-huggingface-space.hf.space # Replace with the actual URL after deploying to HF Spaces
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
